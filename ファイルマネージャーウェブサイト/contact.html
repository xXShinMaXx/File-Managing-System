<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileSphere</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ナビゲーションバー -->
    <header>
      <div class="logo">
        <span class="material-icons">folder</span>
        <h2>FileSphere</h2>
      </div>

      <nav>
        <ul class="nav-links">
          <li><a href="home.html">ホーム</a></li>
          <li><a href="company-profile.html">会社概要</a></li>
          <li><a href="contact.html" class="active">お問い合わせ</a></li>
          <li><a href="privacy-policy.html">プライバシーポリシー</a></li>
          <li><a href="terms.html">利用規約</a></li>
        </ul>
      </nav>

      <div class="header-right">
        <div class="search">
          <span class="material-icons">search</span>
          <input type="text" placeholder="ファイルを検索" />
        </div>

        <button>ログイン</button>
      </div>
    </header>

    <!-- お問い合わせ -->

    <section class="hero">
      <h1>お問い合わせ</h1>
      <p>ご質問・ご相談はお気軽にお問い合わせください。</p>
    </section>

    <div class="container">
      <div class="card">
        <h2>お問い合わせフォーム</h2>

        <form>
          <input type="text" placeholder="お名前" />

          <input type="email" placeholder="メールアドレス" />

          <input type="text" placeholder="件名" />

          <textarea placeholder="お問い合わせ内容"></textarea>

          <button type="submit">送信する</button>
        </form>
      </div>

      <div class="card">
        <h2>サポート情報</h2>

        <p>📧 support@filesphere.jp</p>

        <p>☎ 03-1234-5678</p>

        <p>🕘 平日 9:00〜18:00</p>
      </div>
    </div>
  </body>
</html>
